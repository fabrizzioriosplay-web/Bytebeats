<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio a Bytebeat Voces 🚀</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        .box { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #00ff9d; }
        input[type="file"] { margin: 15px auto; color: #e0e0e0; }
        textarea { width: 100%; height: 150px; background-color: #2a2a2a; color: #00ff9d; font-family: monospace; padding: 10px; box-sizing: border-box; }
        .status { color: #ffca28; font-style: italic; }
    </style>
</head>
<body>

    <h1>Convertidor Bytebeat para Voces (Dollchan)</h1>
    
    <div class="box">
        <input type="file" id="audioFile" accept="audio/*">
        <p class="status" id="status">Esperando archivo...</p>
    </div>

    <div class="box">
        <h3>Código Optimizado</h3>
        <textarea id="outputCode" readonly placeholder="El código aparecerá acá..."></textarea>
    </div>

    <script>
        document.getElementById('audioFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Optimizando frecuencias para voz...";
            const arrayBuffer = await file.arrayBuffer();
            const ghostContext = new (window.AudioContext || window.webkitAudioContext)();
            
            try {
                const audioBuffer = await ghostContext.decodeAudioData(arrayBuffer);
                const rawData = audioBuffer.getChannelData(0);
                
                // CAMBIO CLAVE: Aumentamos el salto de muestras para achicar el tamaño a la mitad
                // Esto hace que Dollchan no se sature con un archivo de 500KB
                const step = Math.max(1, Math.round(audioBuffer.sampleRate / 4000));
                let audioBytes = [];
                
                for (let i = 0; i < rawData.length; i += step) {
                    let byteVal = Math.floor((rawData[i] + 1) * 127.5);
                    if (byteVal > 255) byteVal = 255;
                    if (byteVal < 0) byteVal = 0;
                    audioBytes.push(byteVal);
                }

                // Generamos el truco de una sola línea
                const codeString = `((a)=>(a[t%a.length]))([${audioBytes.join(',')}])`;
                
                document.getElementById('outputCode').value = codeString;
                document.getElementById('status').innerText = `¡Listo! Tamaño optimizado a ${audioBytes.length} muestras.`;

            } catch (error) {
                document.getElementById('status').innerText = "Error al procesar.";
            } finally {
                ghostContext.close();
            }
        });
    </script>
</body>
</html>
